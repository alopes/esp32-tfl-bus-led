; Copy this file to secrets.ini and fill in your values.
;
; Wi-Fi credentials are optional. If omitted, the device starts a
; "BusIndicator-XXYYZZ" Wi-Fi hotspot for browser-based provisioning.
; Use compile-time values below only if you prefer to skip the setup portal.

[env:esp32s3]
build_src_flags =
    -DWIFI_SSID=\"your-wifi-name\"
    -DWIFI_PASSWORD=\"your-wifi-password\"
    -DTFL_STOP_ID=\"your-tfl-stop-naptan-id\"
    -DTRACKED_LINES=\"line1,line2,Nline1\"
